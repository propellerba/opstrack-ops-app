name: Deploy Segments

on:
  push:
    branches:
      - main
      - master
      - development
      - staging
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: auto
        type: choice
        options:
          - auto
          - frontend
          - backend
          - mobile

jobs:
  detect-changes:
    name: Detect Changed Segments
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Segment filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            mobile:
              - 'mobile/**'

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'frontend' || inputs.target == 'auto')) ||
      (github.event_name == 'push' && needs.detect-changes.outputs.frontend == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run frontend deploy script
        run: bash frontend/deploy.sh

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'backend' || inputs.target == 'auto')) ||
      (github.event_name == 'push' && needs.detect-changes.outputs.backend == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run backend deploy script
        run: bash backend/deploy.sh

  deploy-mobile:
    name: Deploy Mobile
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'mobile' || inputs.target == 'auto')) ||
      (github.event_name == 'push' && needs.detect-changes.outputs.mobile == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run mobile deploy script
        run: bash mobile/deploy.sh
